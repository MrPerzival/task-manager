# pytest.ini
# ----------
# pytest configuration for the Task Manager backend test suite.

[pytest]

# ── Test discovery ────────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Output ────────────────────────────────────────────────────────────────────
# -v           → verbose: show each test name and PASSED/FAILED
# --tb=short   → compact traceback on failures (full available as --tb=long)
# -p no:warnings → suppress DeprecationWarning noise from third-party libs
addopts =
    -v
    --tb=short
    -p no:warnings

# ── asyncio mode ─────────────────────────────────────────────────────────────
# Required by pytest-asyncio when mixing sync and async test functions.
asyncio_mode = auto

# ── Markers ───────────────────────────────────────────────────────────────────
markers =
    slow: marks tests that involve real network or DB I/O (skip with -m "not slow")
    integration: marks tests that require a running PostgreSQL instance
