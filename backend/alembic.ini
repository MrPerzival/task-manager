# alembic.ini
# -----------
# Alembic configuration for the Task Manager backend.
# The `sqlalchemy.url` value here is a fallback ONLY — the env.py script
# reads DATABASE_URL from the environment first (so this file never needs
# to contain real credentials and is safe to commit).

[alembic]
# Path to the migration scripts directory
script_location = alembic

# Template for new migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Truncate long migration file slugs
truncate_slug_length = 40

# Fallback DB URL (overridden by DATABASE_URL env var in env.py)
sqlalchemy.url = sqlite:///./tasks.db

# ── Logging ───────────────────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
