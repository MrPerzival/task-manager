# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml  —  Task Manager full stack (backend + PostgreSQL)
# ─────────────────────────────────────────────────────────────────────────────
#
# Quickstart:
#   docker compose up --build
#
# API will be available at:  http://localhost:8000
# Swagger UI:                http://localhost:8000/docs
#
# To wipe the database volume and start fresh:
#   docker compose down -v
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:

  # ── PostgreSQL database ────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine          # lightweight Alpine-based Postgres image
    container_name: task_manager_db
    restart: unless-stopped

    environment:
      POSTGRES_DB:       taskdb
      POSTGRES_USER:     taskuser
      POSTGRES_PASSWORD: taskpass

    ports:
      # Expose 5432 on the host so you can connect with psql / DBeaver locally.
      # Remove this mapping in a hardened production deployment.
      - "5432:5432"

    volumes:
      # Named volume persists data across container restarts and rebuilds.
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskuser -d taskdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── FastAPI backend ────────────────────────────────────────────────────────
  api:
    build:
      context: .                       # Dockerfile lives in the same directory
      dockerfile: Dockerfile
    container_name: task_manager_api
    restart: unless-stopped

    ports:
      - "8000:8000"

    environment:
      # Point at the Compose service name "db" — Docker's internal DNS
      # resolves this to the correct container IP automatically.
      DATABASE_URL: postgresql://taskuser:taskpass@db:5432/taskdb

      # Override these to restrict CORS in production:
      #   ALLOWED_ORIGINS: https://myapp.com,https://staging.myapp.com
      ALLOWED_ORIGINS: "*"

      LOG_LEVEL: INFO

      # Matches EXPOSE in the Dockerfile
      PORT: 8000

    depends_on:
      db:
        # Wait until the DB health check reports healthy before starting the API.
        # This prevents "connection refused" errors during startup.
        condition: service_healthy

    # Optional: mount the local source directory for hot-reload during development.
    # Comment this out (or remove entirely) for production builds.
    volumes:
      - .:/app

    # Hot-reload command (dev only).
    # For production, remove the --reload flag or delete this override entirely
    # so the Dockerfile CMD is used instead.
    command: >
      uvicorn main:app
        --host 0.0.0.0
        --port 8000
        --reload

# ── Named volumes ──────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
