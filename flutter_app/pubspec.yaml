name: task_manager
description: Production-quality Task Management App with Flutter

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP client
  http: ^1.2.1

  # Local storage for draft persistence
  shared_preferences: ^2.2.3

  # Date picker
  intl: ^0.19.0

  # State management (Provider)
  provider: ^6.1.2

  # UUID generation (not needed; backend handles IDs)

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
